<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9D" />
      <stop offset="50%" stop-color="#00CCFF" />
      <stop offset="100%" stop-color="#FF66CC" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#2A0066" />
  <!-- Stars -->
  <path d="M100,120 L120,100 L140,120 L120,140 Z" fill="url(#gradient)" opacity="0.8" />
  <path d="M160,180 L190,150 L220,180 L190,210 Z" fill="url(#gradient)" opacity="0.8" />
  <path d="M100,240 L130,210 L160,240 L130,270 Z" fill="url(#gradient)" opacity="0.8" />
  
  <!-- Rounded square -->
  <rect x="180" y="180" width="220" height="220" rx="60" ry="60" fill="#2A0066" stroke="url(#gradient)" stroke-width="20" />
  
  <!-- AI text -->
  <text x="250" y="325" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#gradient)">AI</text>
</svg> 